dataset: val_benchmark_1200.jsonl
max_queries: null
model_name: mistral:latest
embedding_model: BAAI/bge-large-en-v1.5
retrieval:
  # Keep Simple RAG intentionally lean.
  simple_top_k: 3
  # Give Agentic RAG enough coverage in both retrieval passes.
  agentic_first_top_k: 3
  agentic_second_top_k: 3
evaluation:
  run_llm_judge: true
output:
  save_charts: true
  save_query_level_scores: true
answering:
  # Reduced abstention pressure improved overall answerability in prior runs.
  strict_context_only: false
notes: Experiment 3 biases retrieval budget toward agentic flow and uses mistral for stronger generation.
